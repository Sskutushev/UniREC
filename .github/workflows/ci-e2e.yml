name: E2E CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'docs/**'
      - 'test/**'
      - 'refactor/**'
  pull_request:
    branches:
      - main

jobs:
  e2e-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect e2e tests
        id: detect
        shell: bash
        run: |
          if ls backend/tests/e2e/*.py >/dev/null 2>&1; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip until e2e suite is implemented
        if: steps.detect.outputs.has_tests == 'false'
        run: echo "E2E suite is not implemented yet"
      - uses: actions/setup-python@v5
        if: steps.detect.outputs.has_tests == 'true'
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v3
        if: steps.detect.outputs.has_tests == 'true'
      - name: Run e2e tests
        if: steps.detect.outputs.has_tests == 'true'
        working-directory: backend
        run: |
          uv sync --extra dev
          uv run pytest tests/e2e -q
