services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_brief_decoder_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_brief_decoder_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-tests:
    build:
      context: ../backend
      args:
        INSTALL_DEV: "true"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ai_brief_decoder_test
      REDIS_URL: redis://redis:6379/0
      PROVIDER: fake
      FAKE_PROVIDER_MODE: valid
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "uv run alembic upgrade head && uv run pytest -q"]
